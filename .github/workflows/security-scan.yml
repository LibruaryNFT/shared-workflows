name: Security Scan

on:
  workflow_call:
    inputs:
      scan-type:
        description: "Trivy scan type (fs, repo, image)"
        required: false
        type: string
        default: "fs"
      severity:
        description: "Minimum severity to fail on"
        required: false
        type: string
        default: "CRITICAL,HIGH"
      skip-dirs:
        description: "Directories to skip (comma-separated)"
        required: false
        type: string
        default: ""

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: ${{ inputs.scan-type }}
          scan-ref: "."
          severity: ${{ inputs.severity }}
          # Non-blocking on Dependabot PRs - they are fixing vulns, not introducing them
          exit-code: ${{ github.actor == 'dependabot[bot]' && '0' || '1' }}
          skip-dirs: ${{ inputs.skip-dirs }}
          format: "table"
