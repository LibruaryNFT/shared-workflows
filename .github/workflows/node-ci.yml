name: Node.js CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'
      test-command:
        description: 'Test command to run'
        required: false
        type: string
        default: 'npm test'
      build-command:
        description: 'Build command (leave empty to skip)'
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Build
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}
